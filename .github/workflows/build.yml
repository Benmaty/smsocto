name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.2 manually
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Verify tools
        run: |
          java -version
          gradle --version

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias smsocto \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore smsocto.jks \
            -storepass smsocto123 \
            -keypass smsocto123 \
            -dname "CN=Benmaty, OU=Dev, O=Benmaty, L=Paris, S=IDF, C=FR"

      - name: Build Release APK (signed)
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/smsocto.jks" \
            -Pandroid.injected.signing.store.password="smsocto123" \
            -Pandroid.injected.signing.key.alias="smsocto" \
            -Pandroid.injected.signing.key.password="smsocto123"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smsocto-release-signed
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
